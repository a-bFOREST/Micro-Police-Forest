<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مايكرو شرطة فورست</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000; /* خلفية سوداء كاملة مريحة وفخمة */
            --card-bg: #0b1320; /* أزرق معتم داكن جداً مطابق للصورة */
            --primary: #0099ff; /* لون أزرق للحدود والأزرار */
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: #142238; /* إطار متناسق ومعتم */
            --cyan-glow: linear-gradient(90deg, #00d2ff 0%, #0076ff 100%); /* شريط سمائي مشع */
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        /* تصميم أشرطة العناوين الأساسية باللون السمائي */
        .group-title {
            background: var(--cyan-glow);
            color: #000000; /* كتابة سوداء فوق السمائي لتبدو واضحة وحادة */
            font-weight: 700;
            font-size: 1.25rem;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* تصميم السطر: زر النسخ مجاور تماماً للكلام وليس تحته */
        .macro-row {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        /* خانة النص العريضة والمكبرة */
        .macro-input {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: inherit;
            color: #ffffff;
            background-color: #050a12; /* أرضية الخانة أغمق بقليل لثبات الرؤية */
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .macro-input.editable-mode {
            border-color: #00d2ff;
            background-color: #112035;
        }

        /* تصميم زر النسخ الاحترافي المجاور للنص */
        .copy-btn {
            background-color: transparent;
            color: #00d2ff;
            border: 2px solid #00d2ff;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
            min-width: 90px;
            text-align: center;
        }

        .copy-btn:hover {
            background-color: #00d2ff;
            color: #000000;
        }

        .copy-btn.copied {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }

        /* لوحة التحكم أسفل الموقع */
        .admin-panel {
            background: #090f1a;
            border: 2px dashed #142238;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            margin-top: 50px;
        }

        .admin-panel h3 {
            margin-top: 0;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .admin-input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000000;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            width: 220px;
        }

        .admin-btn {
            background-color: #1e293b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }

        .admin-btn.save-active {
            background-color: var(--success);
        }

        @media (max-width: 500px) {
            .macro-row { padding: 10px; gap: 10px; }
            .macro-input { font-size: 1rem; padding: 10px; }
            .copy-btn { padding: 8px 16px; min-width: 75px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>مايكرو فصيل شرطة فورست 🦅</h1>
    </header>

    <div class="list-container" id="mainGrid">
        
        <div class="group-title"><i class="fa-solid fa-scale-balanced"></i> أولاً: التحذيرات والحقوق</div>
        <div id="group-1"></div>

        <div class="group-title"><i class="fa-solid fa-radio"></i> ثانياً: أوامر الراديو</div>
        <div id="group-2"></div>

        <div class="group-title"><i class="fa-solid fa-gavel"></i> ثالثاً: الانتهاكات الجنائية</div>
        <div id="group-3"></div>

        <div class="group-title"><i class="fa-solid fa-user-shield"></i> رابعاً: الانتهاكات المدنية</div>
        <div id="group-4"></div>

        <div class="group-title"><i class="fa-solid fa-building-shield"></i> خامساً: الانتهاكات الإدارية</div>
        <div id="group-5"></div>

    </div>

    <div class="admin-panel">
        <h3><i class="fa-solid fa-lock"></i> لوحة إدارة رئيس الفصيل (تعديل الأوامر)</h3>
        <div id="loginSection">
            <input type="password" id="passInput" class="admin-input" placeholder="أدخل كلمة المرور"><br>
            <button onclick="checkAdmin()" class="admin-btn">تفعيل وضع التعديل</button>
        </div>
        <div id="controlSection" style="display: none;">
            <p style="color: var(--success); font-weight: bold; margin-bottom: 15px;">✓ وضع التعديل نشط! اكتب التعديلات في الخانات بالأعلى ثم اضغط حفظ.</p>
            <button onclick="saveNewData()" class="admin-btn save-active"><i class="fa-solid fa-floppy-disk"></i> حفظ التعديلات الجديدة للمنصة</button>
        </div>
    </div>
</div>

<script>
    const SECRET_PASSWORD = "1221";
    
    // توزيع الـ 43 خانة على المجموعات الـ 5 المحددة بدقة
    const config = [
        { targetId: 'group-1', start: 1, end: 8, label: 'تحذير/حقوق' },
        { targetId: 'group-2', start: 9, end: 20, label: 'راديو' },
        { targetId: 'group-3', start: 21, end: 30, label: 'جنائية' },
        { targetId: 'group-4', start: 31, end: 37, label: 'مدنية' },
        { targetId: 'group-5', start: 38, end: 43, label: 'إدارية' }
    ];

    let savedData = {};
    try {
        savedData = JSON.parse(localStorage.getItem('police_macros')) || {};
    } catch(e) { savedData = {}; }

    // بناء الخانات آلياً وتوزيعها تحت كل شريط سمائي مخصص لها
    config.forEach(group => {
        const container = document.getElementById(group.targetId);
        for (let i = group.start; i <= group.end; i++) {
            const currentText = savedData[`input-${i}`] || `${group.label} ${i}`;
            
            const row = document.createElement('div');
            row.className = 'macro-row';
            row.style.marginBottom = '10px';
            
            row.innerHTML = `
                <input type="text" class="macro-input" id="input-${i}" value="${currentText}" readonly autocomplete="off">
                <button class="copy-btn" id="btn-${i}">نسخ</button>
            `;
            
            container.appendChild(row);

            // تشغيل وظيفة النسخ الفوري بجانب النص تماماً
            row.querySelector(`#btn-${i}`).addEventListener('click', function() {
                const input = document.getElementById(`input-${i}`);
                navigator.clipboard.writeText(input.value).then(() => {
                    this.classList.add('copied');
                    this.innerText = 'تم!';
                    setTimeout(() => {
                        this.classList.remove('copied');
                        this.innerText = 'نسخ';
                    }, 1200);
                });
            });
        }
    });

    // كود التحقق للمسؤول
    function checkAdmin() {
        if(document.getElementById('passInput').value === SECRET_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('controlSection').style.display = 'block';
            document.querySelectorAll('.macro-input').forEach(input => {
                input.removeAttribute('readonly');
                input.classList.add('editable-mode');
            });
        } else {
            alert('كلمة المرور خاطئة!');
        }
    }

    // كود الحفظ الشامل للـ 43 خانة
    function saveNewData() {
        let dataToSave = {};
        for(let i = 1; i <= 43; i++) {
            dataToSave[`input-${i}`] = document.getElementById(`input-${i}`).value;
        }
        localStorage.setItem('police_macros', JSON.stringify(dataToSave));
        alert('✓ تم حفظ التقسيمات والأوامر الجديدة بنجاح!');
        location.reload();
    }
</script>

</body>
</html>
