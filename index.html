<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مايكرو فصيل شرطة فورست - منصة النسخ السريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1424; /* الخلفية الداكنة الفخمة للفصيل */
            --card-bg: #161f33; /* لون خلفية السطور */
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: #232e48;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px; /* عرض متناسق جداً مع التصميم العمودي */
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* قائمة الخانات العمودية التلقائية */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 14px; /* مسافة عمودية ممتازة بين الخانات */
            margin-bottom: 40px;
        }

        /* تصميم السطر العمودي المطور والكبير */
        .macro-row {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            transition: border-color 0.2s;
        }

        .macro-row:hover {
            border-color: var(--primary);
        }

        /* تكبير خانة النص المحمية وتوسيعها */
        .macro-input {
            flex-grow: 1;
            padding: 14px 18px; /* تكبير الحشو الداخلي لجعل الخانة أضخم */
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1.15rem; /* تكبير حجم الخط المكتوب بالداخل */
            font-family: inherit;
            color: #e2e8f0;
            background-color: #0f172a;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        /* مظهر الخانة أثناء وضع التعديل الخاص بك */
        .macro-input.editable-mode {
            border-color: var(--primary);
            background-color: #1e293b;
            color: #ffffff;
        }

        /* تصميم زر النسخ الكبير والمتناسق */
        .copy-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 24px; /* تكبير الزر ليتناسق مع حجم الخانة */
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s;
            min-width: 105px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background-color: var(--primary-hover);
        }

        .copy-btn.copied {
            background-color: var(--success);
        }

        /* لوحة تحكم رئيس الفصيل بالأسفل */
        .admin-panel {
            background: #111827;
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }

        .admin-panel h3 {
            margin-top: 0;
            color: var(--text-muted);
            font-size: 1.15rem;
            margin-bottom: 15px;
        }

        .admin-input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1424;
            color: white;
            text-align: center;
            font-size: 1.05rem;
            margin-bottom: 15px;
            outline: none;
            width: 220px;
        }

        .admin-btn {
            background-color: #374151;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            transition: background 0.2s;
        }

        .admin-btn.save-active {
            background-color: var(--success);
        }

        /* متوافق تماماً مع الهواتف لضمان عدم خروج الأزرار */
        @media (max-width: 500px) {
            .macro-row { 
                flex-direction: column; 
                align-items: stretch; 
                gap: 12px; 
                padding: 12px;
            }
            .copy-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>مايكرو فصيل شرطة فورست 🦅</h1>
    </header>

    <div class="list-container" id="cardsGrid"></div>

    <div class="admin-panel">
        <h3><i class="fa-solid fa-lock"></i> لوحة إدارة رئيس الفصيل (تعديل الأوامر)</h3>
        <div id="loginSection">
            <input type="password" id="passInput" class="admin-input" placeholder="أدخل كلمة المرور"><br>
            <button onclick="checkAdmin()" class="admin-btn">تفعيل وضع التعديل</button>
        </div>
        <div id="controlSection" style="display: none;">
            <p style="color: var(--success); font-weight: bold; margin-bottom: 15px;">✓ وضع التعديل نشط الآن! يمكنك الكتابة وتغيير الأوامر في الخانات بالأعلى.</p>
            <button onclick="saveNewData()" class="admin-btn save-active"><i class="fa-solid fa-floppy-disk"></i> حفظ التعديلات الجديدة للمنصة</button>
        </div>
    </div>
</div>

<script>
    const totalMacros = 30;
    const SECRET_PASSWORD = "1221"; // رمز الأمان الخاص بك
    const grid = document.getElementById('cardsGrid');

    let savedData = {};
    try {
        savedData = JSON.parse(localStorage.getItem('police_macros')) || {};
    } catch(e) { savedData = {}; }

    // إنشاء الـ 30 خانة المكبرة والمحمية بدون عناوين
    for (let i = 1; i <= totalMacros; i++) {
        const currentText = savedData[`input-${i}`] || `مايكرو ${i}`;
        
        const row = document.createElement('div');
        row.className = 'macro-row';
        
        row.innerHTML = `
            <input type="text" class="macro-input" id="input-${i}" value="${currentText}" readonly autocomplete="off">
            <button class="copy-btn" id="btn-${i}">
                <i class="fa-regular fa-copy"></i>
                <span>نسخ</span>
            </button>
        `;
        
        grid.appendChild(row);

        // برمجة زر النسخ السريع والذكي للأعضاء
        row.querySelector(`#btn-${i}`).addEventListener('click', function() {
            const input = document.getElementById(`input-${i}`);
            const btnText = this.querySelector('span');
            const btnIcon = this.querySelector('i');
            
            navigator.clipboard.writeText(input.value).then(() => {
                this.classList.add('copied');
                btnText.innerText = 'تم!';
                btnIcon.className = 'fa-solid fa-check';
                
                setTimeout(() => {
                    this.classList.remove('copied');
                    btnText.innerText = 'نسخ';
                    btnIcon.className = 'fa-regular fa-copy';
                }, 1500);
            });
        });
    }

    // دالة فحص كلمة المرور لفتح قفل الكتابة والتعديل لكم
    function checkAdmin() {
        const enteredPass = document.getElementById('passInput').value;
        if(enteredPass === SECRET_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('controlSection').style.display = 'block';
            
            document.querySelectorAll('.macro-input').forEach(input => {
                input.removeAttribute('readonly');
                input.classList.add('editable-mode');
            });
        } else {
            alert('كلمة المرور خاطئة! صلاحية التعديل محصورة برئيس الفصيل فقط.');
        }
    }

    // دالة حفظ الأوامر الجديدة في النظام
    function saveNewData() {
        let dataToSave = {};
        for(let i = 1; i <= totalMacros; i++) {
            dataToSave[`input-${i}`] = document.getElementById(`input-${i}`).value;
        }
        localStorage.setItem('police_macros', JSON.stringify(dataToSave));
        alert('✓ تم حفظ الأوامر الجديدة بنجاح وأصبحت جاهزة لجميع الأعضاء!');
        location.reload();
    }
</script>

</body>
</html>
