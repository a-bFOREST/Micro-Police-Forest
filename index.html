<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مايكرو فصيل شرطة فورست</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1424;
            --card-bg: #161f33;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: #232e48;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background-color: #ffffff;
            color: #000000;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .filter-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .macro-row {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .macro-info {
            min-width: 80px;
        }

        .macro-num {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .macro-input {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            color: #e2e8f0;
            background-color: #0f172a;
            box-sizing: border-box;
        }

        .macro-input.editable-mode {
            border-color: var(--primary);
            background-color: #1e293b;
            color: #ffffff;
        }

        .copy-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            min-width: 95px;
        }

        .copy-btn.copied {
            background-color: var(--success);
        }

        .admin-panel {
            background: #111827;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .admin-input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0d1424;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
        }

        .admin-btn {
            background-color: #374151;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-btn.save-active {
            background-color: var(--success);
        }

        @media (max-width: 500px) {
            .macro-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .copy-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>مايكرو فصيل شرطة فورست 🦅</h1>
        <input type="text" class="search-box" id="searchBox" placeholder="بحث عن مايكرو...">
        
        <div class="filter-container">
            <button class="filter-btn active" id="btn-all">الكل</button>
            <button class="filter-btn" id="btn-traffic">مرور</button>
            <button class="filter-btn" id="btn-assault">اعتداءات</button>
            <button class="filter-btn" id="btn-reports">بلاغات</button>
        </div>
    </header>

    <div class="list-container" id="cardsGrid"></div>

    <div class="admin-panel">
        <h3><i class="fa-solid fa-lock"></i> لوحة الإدارة (تعديل المحتوى)</h3>
        <div id="loginSection">
            <input type="password" id="passInput" class="admin-input" placeholder="أدخل كلمة المرور"><br>
            <button id="loginBtn" class="admin-btn">تفعيل وضع التعديل</button>
        </div>
        <div id="controlSection" style="display: none;">
            <p style="color: var(--success); font-weight: bold;">✓ وضع التعديل نشط! عدل الخانات بالأعلى ثم احفظ.</p>
            <button id="saveBtn" class="admin-btn save-active">حفظ جميع التعديلات</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
